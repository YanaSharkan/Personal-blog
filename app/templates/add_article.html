<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Article - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        form { max-width: 600px; }
        label { display: block; margin-top: 1em; }
        input[type="text"], textarea { width: 100%; padding: 0.5em; margin-top: 0.2em; }
        textarea { min-height: 150px; }
        button { margin-top: 1.5em; padding: 0.7em 1.5em; }
        .back-link { margin-top: 2em; display: inline-block; }
    </style>
</head>
<body>
    <h1>Add New Article</h1>
    <form method="post" action="/admin/articles">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="content">Content:</label>
        <textarea id="content" name="content" required></textarea>

        <label for="date">Date (YYYY-MM-DD):</label>
        <input type="text" id="date" name="date" required>

        <button type="submit">Publish Article</button>
    </form>
    <a href="/admin/articles" class="back-link">&larr; Back to Dashboard</a>
</body>
</html>
