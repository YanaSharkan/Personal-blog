<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Admin Password - My Blog</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        form { max-width: 350px; margin: 0 auto; }
        label { display: block; margin-top: 1em; }
        input[type="password"] { width: 100%; padding: 0.5em; margin-top: 0.2em; }
        button { margin-top: 1.5em; padding: 0.7em 1.5em; }
        .back-link { margin-top: 2em; display: inline-block; }
    </style>
</head>
<body>
    <h1>Change Admin Password</h1>
    <form method="post" action="/admin/password">
        <label for="old_password">Current Password:</label>
        <input type="password" id="old_password" name="old_password" required>
        <label for="new_password">New Password:</label>
        <input type="password" id="new_password" name="new_password" required>
        <button type="submit">Change Password</button>
    </form>
    <a href="/admin/articles" class="back-link">&larr; Back to Dashboard</a>
</body>
</html>
